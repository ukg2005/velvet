services:
  backend:
    build: ./backend
    container_name: velvet_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=*,localhost,127.0.0.1,backend
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build: ./frontend
    container_name: velvet_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    command: npm run dev
